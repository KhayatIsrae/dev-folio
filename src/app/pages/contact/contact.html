<section class="contact-section">

    <!-- LEFT SIDE -->
    <div class="contact-info">
        <h2>Contact Me</h2>
        <p>
            Vous avez une proposition de projet, une collaboration
            ou une question ? N’hésitez pas à me contacter.
        </p>

        <div class="info-item">
            <strong>Email :</strong>
            <span>devfolio@email.com</span>
        </div>

        <div class="info-item">
            <strong>Téléphone :</strong>
            <span>+212 6 00 00 00 00</span>
        </div>

        <div class="social-links">

            <!-- LINKEDIN -->

            <a href="https://linkedin.com" target="_blank" class="social-btn">

                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">

                    <path
                        d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.11 1 2.5 1 4.98 2.12 4.98 3.5zM.5 8h4V24h-4V8zm7.5 0h3.8v2.2h.1c.5-1 1.8-2.2 3.8-2.2 4.1 0 4.9 2.7 4.9 6.3V24h-4v-7.3c0-1.7 0-4-2.5-4s-2.9 1.9-2.9 3.8V24h-4V8z" />

                </svg>

                <span>LinkedIn</span>

            </a>

            <!-- GITHUB -->

            <a href="https://github.com" target="_blank" class="social-btn">

                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">

                    <path
                        d="M12 .5C5.7.5.7 5.7.7 12.2c0 5.2 3.4 9.6 8.2 11.2.6.1.8-.3.8-.6v-2.1c-3.3.7-4-1.4-4-1.4-.5-1.2-1.3-1.6-1.3-1.6-1.1-.8.1-.8.1-.8 1.2.1 1.8 1.2 1.8 1.2 1.1 2 2.9 1.4 3.6 1.1.1-.8.4-1.4.7-1.7-2.6-.3-5.3-1.4-5.3-6.2 0-1.4.5-2.5 1.2-3.4-.1-.3-.5-1.6.1-3.3 0 0 1-.3 3.4 1.3 1-.3 2-.4 3-.4s2 .1 3 .4c2.4-1.6 3.4-1.3 3.4-1.3.6 1.7.2 3 .1 3.3.8.9 1.2 2 1.2 3.4 0 4.8-2.7 5.9-5.3 6.2.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6 4.8-1.6 8.2-6 8.2-11.2C23.3 5.7 18.3.5 12 .5z" />

                </svg>

                <span>GitHub</span>

            </a>

        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="contact-form-container">
        <form class="contact-form">

            <div class="input-group">
                <label>Nom*</label>
                <input type="text" [(ngModel)]="nom" placeholder="Votre nom" name="nom">
            </div>

            <div class="input-group">
                <label>Email*</label>
                <input type="email" [(ngModel)]="email" placeholder="Votre email" name="email">
            </div>

            <div class="input-group">
                <label>Sujet</label>
                <input type="text" [(ngModel)]="subject" placeholder="Sujet du message" name="subject">
            </div>

            <div class="input-group">
                <label>Message*</label>
                <textarea rows="6" [(ngModel)]="message" placeholder="Écrivez votre message..."
                    name="message"></textarea>
            </div>
            @if(erreur){
            <small class="error-message">
                {{erreur}}
            </small>
            }

            @if(succes){
            <small class="success-message">
                {{succes}}
            </small>
            }
            <button (click)="envoyerMessage()" class="send-btn">
                Envoyer
            </button>

        </form>

    </div>

</section>
