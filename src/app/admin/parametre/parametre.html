<div class="settings-wrapper">
  <div class="page-header">
    <h1 class="page-title">Paramètres</h1>
    <p class="page-sub">Personnalisez les informations de votre portfolio</p>
  </div>

  <div class="settings-grid">

    <!-- Profil public -->
    <div class="card settings-card">
      <h2 class="settings-section-title">Profil public</h2>
      <form (ngSubmit)="saveProfile()">
        <div class="avatar-upload">
          <div class="upload-avatar">S</div>
          <div>
            <div class="upload-name">Photo de profil</div>
            <button type="button" class="btn btn-outline btn-sm">Changer</button>
          </div>
        </div>
        <div class="form-row form-row-2">
          <div class="form-group">
            <label>Prénom</label>
            <input type="text" [(ngModel)]="profile.firstName" name="firstName">
          </div>
          <div class="form-group">
            <label>Nom</label>
            <input type="text" [(ngModel)]="profile.lastName" name="lastName">
          </div>
        </div>
        <div class="form-group">
          <label>Titre professionnel</label>
          <input type="text" [(ngModel)]="profile.title" name="title">
        </div>
        <div class="form-group">
          <label>Localisation</label>
          <input type="text" [(ngModel)]="profile.location" name="location">
        </div>
        <div class="form-group">
          <label>Bio <span class="label-hint">(affiché dans le hero)</span></label>
          <textarea [(ngModel)]="profile.bio" name="bio" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-sm">Enregistrer le profil</button>
      </form>
    </div>

    <!-- Informations de contact -->
    <div class="card settings-card">
      <h2 class="settings-section-title">Informations de contact</h2>
      <form (ngSubmit)="saveContact()">
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="contact.email" name="email">
        </div>
        <div class="form-group">
          <label>Téléphone</label>
          <input type="text" [(ngModel)]="contact.phone" name="phone">
        </div>
        <div class="form-group">
          <label>LinkedIn</label>
          <input type="url" [(ngModel)]="contact.linkedin" name="linkedin" placeholder="https://linkedin.com/in/...">
        </div>
        <div class="form-group">
          <label>GitHub</label>
          <input type="url" [(ngModel)]="contact.github" name="github" placeholder="https://github.com/...">
        </div>
        <button type="submit" class="btn btn-primary btn-sm">Enregistrer</button>
      </form>
    </div>

    <!-- Sécurité -->
    <div class="card settings-card">
      <h2 class="settings-section-title">Sécurité</h2>
      <form (ngSubmit)="changePassword()">
        <div class="form-group">
          <label>Mot de passe actuel</label>
          <input type="password" [(ngModel)]="security.currentPass" name="currentPass" placeholder="••••••••">
        </div>
        <div class="form-group">
          <label>Nouveau mot de passe</label>
          <input type="password" [(ngModel)]="security.newPass" name="newPass" placeholder="••••••••">
        </div>
        <div class="form-group">
          <label>Confirmer le mot de passe</label>
          <input type="password" [(ngModel)]="security.confirmPass" name="confirmPass" placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-outline btn-sm">Changer le mot de passe</button>
      </form>
    </div>

    <!-- Zone de danger -->
    <div class="card settings-card danger-zone">
      <h2 class="settings-section-title danger-title">Zone de danger</h2>
      <p class="danger-desc">Ces actions sont irréversibles. Procédez avec précaution.</p>
      <div class="danger-actions">
        <button class="btn btn-outline btn-sm" (click)="exportData()">
          <span class="btn-icon">↓</span> Exporter les données
        </button>
        <button class="btn btn-danger btn-sm" (click)="confirmReset()">
          Réinitialiser le portfolio
        </button>
      </div>
    </div>

  </div>
</div>
